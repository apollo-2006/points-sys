<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SEASON 2 · BATTLE FOR THE TOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0A0C0F;
    --panel:#14171D;
    --panel-light:#1C2028;
    --border:#272C35;
    --flame:#FF5A1F;
    --flame-dim:#7A2E14;
    --cyan:#3EC6E0;
    --purple:#B463FF;
    --gold:#FFC94A;
    --white-evo:#E9ECEF;
    --text:#EDEFF2;
    --text-muted:#868C96;
    --danger:#FF5252;
    --success:#4CD97B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,90,31,0.10), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(62,198,224,0.08), transparent 60%),
      var(--void);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--flame);color:#0A0C0F;}

  .wrap{max-width:920px;margin:0 auto;padding:20px 16px 60px;}

  /* ---------- HEADER ---------- */
  .topbar{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--border);padding-bottom:14px;margin-bottom:14px;
    gap:12px;flex-wrap:wrap;
  }
  .brand-eyebrow{
    font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;
    color:var(--flame);text-transform:uppercase;
  }
  h1{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(24px,5vw,34px);
    margin:2px 0 0;letter-spacing:1px;text-transform:uppercase;
    text-shadow:0 0 20px rgba(255,90,31,0.25);
  }
  .ranking-tag{
    font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-muted);
    background:var(--panel);border:1px solid var(--border);padding:6px 12px;
    clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px);
  }
  .ranking-tag b{color:var(--gold);}

  .shared-note{
    font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-muted);
    border:1px dashed var(--border);padding:8px 12px;margin-bottom:20px;
    display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;
  }
  .shared-note b{color:var(--cyan);}

  /* ---------- EVO BANNERS ---------- */
  .banners{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
  @media (max-width:560px){.banners{grid-template-columns:1fr;}}

  .banner{
    position:relative;background:linear-gradient(180deg,var(--panel-light),var(--panel));
    border:1px solid var(--border);padding:18px 18px 16px;
    clip-path:polygon(0 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%);
    overflow:hidden;
  }
  .banner::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:var(--tier-color,var(--cyan));
    box-shadow:0 0 14px var(--tier-color,var(--cyan));
  }
  .banner-head{display:flex;justify-content:space-between;align-items:center;}
  .banner-name{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:0.5px;
    cursor:pointer;text-transform:uppercase;
  }
  .banner-name:hover{color:var(--flame);}
  .evo-hex{
    width:34px;height:34px;
    clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    background:var(--tier-color,var(--cyan));
    display:flex;align-items:center;justify-content:center;
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:#0A0C0F;
    box-shadow:0 0 16px var(--tier-color,var(--cyan));
  }
  .banner-points{
    font-family:'Share Tech Mono',monospace;font-size:32px;font-weight:700;margin:10px 0 2px;
    letter-spacing:1px;
  }
  .banner-tier-label{
    font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;
  }
  .evo-track{height:6px;background:#0A0C0F;border:1px solid var(--border);position:relative;overflow:hidden;}
  .evo-fill{height:100%;background:var(--tier-color,var(--cyan));transition:width .6s ease;
    box-shadow:0 0 10px var(--tier-color,var(--cyan));}

  /* ---------- TABS ---------- */
  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{
    font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;letter-spacing:1px;
    text-transform:uppercase;background:var(--panel);border:1px solid var(--border);
    color:var(--text-muted);padding:9px 16px;cursor:pointer;
    clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px);
    transition:all .15s ease;
  }
  .tab-btn:hover{color:var(--text);border-color:var(--flame-dim);}
  .tab-btn.active{background:var(--flame);color:#0A0C0F;border-color:var(--flame);}

  /* ---------- CONTENT ---------- */
  .panel-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;
    letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin:22px 0 10px;}
  .panel-title:first-child{margin-top:0;}
  .col2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media (max-width:640px){.col2{grid-template-columns:1fr;}}

  .card{
    background:var(--panel);border:1px solid var(--border);
    padding:12px 14px;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .card-info{flex:1;min-width:150px;}
  .card-label{font-size:14px;font-weight:500;}
  .card-pts{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-muted);margin-top:2px;}
  .card-pts.neg{color:var(--danger);}
  .card-pts.pos{color:var(--success);}
  .card-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

  .pill{
    font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12.5px;letter-spacing:0.5px;
    text-transform:uppercase;border:1px solid var(--border);background:var(--panel-light);
    color:var(--text);padding:7px 12px;cursor:pointer;transition:all .12s ease;
  }
  .pill:hover:not(:disabled){border-color:var(--flame);color:var(--flame);}
  .pill:disabled{opacity:0.35;cursor:not-allowed;}
  .pill.abir{border-color:#2b4a56;}
  .pill.abir:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan);}
  .pill.jade{border-color:#5a3a2b;}
  .pill.jade:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .pill.danger:hover:not(:disabled){border-color:var(--danger);color:var(--danger);}
  .pill.ghost{background:none;color:var(--text-muted);padding:7px 9px;font-size:14px;}
  .pill.ghost:hover:not(:disabled){color:var(--danger);border-color:var(--danger);}

  .card-remove-btn{
    background:none;border:1px solid transparent;color:var(--text-muted);
    padding:6px 9px;font-size:14px;cursor:pointer;border-radius:2px;
    opacity:0.28;transition:opacity .15s ease,color .15s ease,border-color .15s ease;
  }
  .card:hover .card-remove-btn{opacity:1;}
  .card-remove-btn:hover{color:var(--danger);border-color:var(--danger);opacity:1;}

  .daily-board{
    font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-muted);
    background:var(--panel);border:1px solid var(--border);padding:10px 14px;
    margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;
  }
  .daily-board-label{color:var(--flame);letter-spacing:2px;font-weight:bold;}

  .count-tag{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-muted);}

  .empty-note{color:var(--text-muted);font-size:13px;font-style:italic;padding:10px 2px;}

  /* forms */
  .bet-form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .bet-form input{
    background:var(--panel-light);border:1px solid var(--border);color:var(--text);
    padding:9px 10px;font-family:'Inter',sans-serif;font-size:13px;flex:1;min-width:120px;
  }
  .bet-form input:focus{outline:none;border-color:var(--flame);}
  .btn-flame{
    font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    background:var(--flame);color:#0A0C0F;border:none;padding:9px 18px;cursor:pointer;
  }
  .btn-flame:hover{background:#ff7440;}

  /* history */
  .hist-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .hist-meta{color:var(--text-muted);font-family:'Share Tech Mono',monospace;font-size:11px;}
  .hist-delta{font-family:'Share Tech Mono',monospace;font-weight:600;white-space:nowrap;}

  .top-actions{display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px;}
  .link-btn{background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;}
  .link-btn:hover{color:var(--flame);}

  .num-input{width:70px;background:var(--panel-light);border:1px solid var(--border);color:var(--text);padding:6px;font-family:'Share Tech Mono',monospace;font-size:12px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div>
      <div class="brand-eyebrow">Season 2 · Fall 26</div>
      <h1>Battle For The Top</h1>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <div class="ranking-tag" id="rankingTag">Loading ranking…</div>

</div>

<script type="module">

const NEEDS_SETUP = firebaseConfig.apiKey === "YOUR_API_KEY";

if (NEEDS_SETUP) {
  document.getElementById('setupGate').style.display = 'block';
  document.getElementById('setupGate').innerHTML = `
    <div class="card" style="display:block;">
      <div class="panel-title" style="margin-top:0;">Connect your database</div>

} else {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js");
  const { getFirestore, doc, onSnapshot, setDoc } = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js");
  const { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } =
    await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js");

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const stateRef = doc(db, "apex_tracker", "state");
  const auth = getAuth(fbApp);

  window.__auth = {
    signIn(){
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      document.getElementById('loginError').textContent = '';
      signInWithEmailAndPassword(auth, email, password).catch(e=>{
        document.getElementById('loginError').textContent = 'Sign in failed — check your email and password.';
      });
    },
    signOut(){
      signOut(auth);
    }
  };

  let started = false;
  onAuthStateChanged(auth, (user)=>{
    if(user){
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('authStatus').innerHTML = 'Signed in as ' + user.email + ' · <button class="link-btn" onclick="__auth.signOut()">Sign out</button>';
      if(!started){
        started = true;
        runApp({ onSnapshot, setDoc, stateRef });
      }
    } else {
      document.getElementById('app').style.display = 'none';
      document.getElementById('loginGate').style.display = 'block';
      document.getElementById('authStatus').textContent = '';
    }
  });
}

function runApp({ onSnapshot, setDoc, stateRef }){
document.getElementById('app').style.display = 'block';

const DAILY = [

  {id:'chores', label:'Chores completed', pts:1500},

const ACHIEVEMENTS = [

  {id:'perfect_sleep_week', label:'One full week of perfect sleep', pts:5000},
  {id:'meals_tracked_week', label:'One full week of meals tracked', pts:5000},
  {id:'assignments_on_time', label:'Assignments on time all week', pts:5000},
];

const PENALTIES = [
  {id:'forgot_tracking', label:'Forgetting to keep track of points', pts:-5000},
  {id:'junk_food', label:'Ate junk food / binge meal', pts:-2000},

  {id:'ignored_chores', label:'Ignored chores (2+ days)', pts:-2000},
  {id:'laziness', label:'Laziness / procrastination', pts:-1500},
  {id:'skipped_workout', label:'Skipped workout', pts:-2500},
  {id:'downplaying', label:'Downplaying events', pts:-1500},
  {id:'feeling_bad_ex', label:'Feeling bad for ex', pts:-1500},
];

const QUESTS = {
  abir: [
    {id:'organize_room_a', label:'Organize room', pts:2000},
    {id:'leetcode_easy', label:'LeetCode: 2 easy solved', pts:1000},
    {id:'leetcode_med', label:'LeetCode: 1 medium solved', pts:2000},
    {id:'leetcode_hard', label:'LeetCode: 1 hard solved', pts:3000},
    {id:'git_commits', label:'3–5 Git commits today', pts:4000},

    {id:'career_textbook', label:'Read career textbook (45 min, notes = bonus)', pts:2000},
    {id:'organize_room_j', label:'Organize room', pts:2000},
    {id:'cook_meal', label:'Cook meal (2x this week)', pts:2500},

    {id:'license_j', label:'License', pts:3000},
    {id:'online_desk_job', label:'Look into online desk job', pts:3000},
    {id:'flower_language', label:'Flower language', pts:1000},
  ]
};

const SHOP = {
  jade: [
    {id:'bookshelf', label:'Rotating bookshelf', pts:60000, note:'$60'},
    {id:'upgrade_bp', label:'Battle Pass upgrade', pts:20000, note:'$20'},
    {id:'apex_coins_j', label:'Apex coin pack · 2150', pts:20000, note:'$20'},
    {id:'exotic_shard_j', label:'Exotic shard pack · 50', pts:40000, note:'$40'},
    {id:'wishlist_j', label:'Amazon wishlist pick', pts:20000, note:'up to $20+', flexible:true},
    {id:'candle', label:'A candle :)', pts:null, note:'priceless'},
  ],
  abir: [
    {id:'apex_coins_a', label:'Apex coin pack · 2150', pts:20000, note:'$20'},
    {id:'exotic_shard_a', label:'Exotic shard pack · 50', pts:40000, note:'$40'},
    {id:'mousepad', label:'Mousepad', pts:29000, note:'$29'},
    {id:'wishlist_a', label:'Amazon wishlist pick', pts:20000, note:'flexible', flexible:true},
    {id:'nessie_plush', label:'Nessie plush', pts:null, note:'priceless'},
  ]
};

const TIER_COLORS = ['#E9ECEF','#3EC6E0','#B463FF','#FFC94A']; // white, blue, purple, gold
const TIER_NAMES = ['White','Blue','Purple','Gold'];
const TIER_SPAN = 15000;
const STORAGE_KEY = 'apex_tracker_state';

let state = null;
let activeTab = 'daily';

function defaultState(){
  return {
    names: {abir:'Abir', jade:'Jade'},
    points: {abir:34000, jade:32000},
    counts: {abir:{}, jade:{}}, // key -> {date:'YYYY-MM-DD', n:number} — resets display daily
    customDaily: [], // {id,label,pts}
    customQuests: {abir:[], jade:[]},
    customShop: {abir:[], jade:[]}, // {id,label,pts,note}
    hiddenDaily: [], // ids of built-in daily habits the user has removed
    bets: [], // {id,title,stake,status,winner,ts}
    history: [] // {ts, party, delta, reason, key}
  };
}

function mergeState(parsed){
  const d = defaultState();
  state = Object.assign(d, parsed);
  state.points = Object.assign(d.points, parsed.points||{});
  state.names = Object.assign(d.names, parsed.names||{});
  state.counts = Object.assign({abir:{},jade:{}}, parsed.counts||{});
  state.customDaily = parsed.customDaily || [];
  state.customQuests = Object.assign({abir:[],jade:[]}, parsed.customQuests||{});
  state.customShop = Object.assign({abir:[],jade:[]}, parsed.customShop||{});
  state.hiddenDaily = parsed.hiddenDaily || [];
  state.bets = parsed.bets || [];
  state.history = parsed.history || [];
}

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function getCountToday(party, key){
  const c = state.counts[party][key];
  if(!c || c.date !== todayKey()) return 0;
  return c.n;
}

function bumpCount(party, key){
  const day = todayKey();
  const c = state.counts[party][key];
  if(c && c.date === day){ c.n += 1; }
  else{ state.counts[party][key] = {date: day, n: 1}; }
}

function dropCount(party, key){
  const day = todayKey();
  const c = state.counts[party][key];
  if(c && c.date === day && c.n > 0){ c.n -= 1; }
}

let applyingRemote = false;

function subscribeState(){
  onSnapshot(stateRef, (snap)=>{
    applyingRemote = true;
    if(snap.exists()){
      mergeState(snap.data());
    } else {
      state = defaultState();
      setDoc(stateRef, state).catch(e=>console.error('init write failed', e));
    }
    renderAll();
    applyingRemote = false;
  }, (err)=>{
    console.error('listen failed', err);
    document.getElementById('content').innerHTML =
      '<div class="empty-note">Could not reach the database. Double-check your Firebase config and Firestore security rules.</div>';
  });
}

async function saveState(){
  if(applyingRemote) return;
  try{
    await setDoc(stateRef, state);
  }catch(e){
    console.error('save failed', e);
  }
}

function fmt(n){
  const sign = n < 0 ? '-' : (n > 0 ? '+' : '');
  return sign + Math.abs(n).toLocaleString();
}

function tierInfo(points){
  const idx = Math.max(0, Math.floor(points / TIER_SPAN));
  const color = TIER_COLORS[idx % 4];
  const name = TIER_NAMES[idx % 4];
  const level = idx + 1;
  const progress = ((points % TIER_SPAN) + TIER_SPAN) % TIER_SPAN / TIER_SPAN;
  return {color, name, level, progress};
}

function addHistory(party, delta, reason, key){
  state.history.unshift({ts: Date.now(), party, delta, reason, key});
  if(state.history.length > 400) state.history.length = 400;
}

function claim(key, party, delta, reason){
  state.points[party] = (state.points[party]||0) + delta;
  bumpCount(party, key);
  addHistory(party, delta, reason, key);
  saveState();
  renderAll();
}

function undoLast(key, party){
  const idx = state.history.findIndex(h=>h.party===party && h.key===key);
  if(idx===-1) return;
  const entry = state.history[idx];
  state.points[party] = (state.points[party]||0) - entry.delta;
  dropCount(party, key);
  state.history.splice(idx,1);
  saveState();
  renderAll();
}

function redeemShop(party, id, customCost){
  const item = SHOP[party].find(i=>i.id===id) || state.customShop[party].find(i=>i.id===id);
  const cost = customCost != null ? customCost : item.pts;
  if(cost != null){
    if(state.points[party] < cost){
      alert((state.names[party]||party) + " doesn't have enough points for this yet.");
      return;
    }
    claim('shop:'+id, party, -cost, 'Redeemed: '+item.label);
  } else {
    claim('shop:'+id, party, 0, 'Claimed: '+item.label);
  }
}

function addCustomDaily(label, pts){
  if(!label || !pts) return;
  state.customDaily.push({id:'c_'+Date.now(), label, pts});
  saveState(); renderAll();
}
function removeCustomDaily(id){
  state.customDaily = state.customDaily.filter(i=>i.id!==id);
  saveState(); renderAll();
}
function hideBaseDaily(id){
  if(!state.hiddenDaily.includes(id)) state.hiddenDaily.push(id);
  saveState(); renderAll();
}
function addCustomQuest(party, label, pts){
  if(!label || !pts) return;
  state.customQuests[party].push({id:'c_'+Date.now(), label, pts});
  saveState(); renderAll();
}
function removeCustomQuest(party, id){
  state.customQuests[party] = state.customQuests[party].filter(i=>i.id!==id);
  saveState(); renderAll();
}
function addCustomShop(party, label, pts, note){
  if(!label || !pts) return;
  state.customShop[party].push({id:'c_'+Date.now(), label, pts, note: note||''});
  saveState(); renderAll();
}
function removeCustomShop(party, id){
  state.customShop[party] = state.customShop[party].filter(i=>i.id!==id);
  saveState(); renderAll();
}

function renameParty(party){
  const current = state.names[party];
  const next = prompt('Rename '+current, current);
  if(next && next.trim()){
    state.names[party] = next.trim();
    saveState();
    renderAll();
  }
}

function resetSeason(){
  if(!confirm('Reset all points, claims, quests and history back to season start? This cannot be undone.')) return;
  state = defaultState();
  saveState();
  renderAll();
}

/* ---------------- RENDER ---------------- */

function renderBanners(){
  const el = document.getElementById('banners');
  el.innerHTML = ['abir','jade'].map(p=>{
    const pts = state.points[p];
    const t = tierInfo(pts);
    return `
    <div class="banner" style="--tier-color:${t.color}">
      <div class="banner-head">
        <div class="banner-name" onclick="__app.renameParty('${p}')">${state.names[p]}</div>
        <div class="evo-hex">${t.level}</div>
      </div>
      <div class="banner-points">${pts.toLocaleString()}</div>
      <div class="banner-tier-label">${t.name} Evo · Tier ${t.level}</div>
      <div class="evo-track"><div class="evo-fill" style="width:${(t.progress*100).toFixed(1)}%"></div></div>
    </div>`;
  }).join('');

  const a = state.points.abir, j = state.points.jade;
  const rt = document.getElementById('rankingTag');
  if(a===j){ rt.innerHTML = 'Dead even'; }
  else{
    const abirLeads = a>j;
    const leader = abirLeads ? state.names.abir : state.names.jade;
    const diff = Math.abs(a-j);
    const color = abirLeads ? '#722F37' : '#004700';
    rt.innerHTML = '<b style="color:'+color+'">'+leader+'</b> leads by '+diff.toLocaleString();
  }
}

function claimCard(key, label, pts, note, removeAction){
  const cA = getCountToday('abir', key);
  const cJ = getCountToday('jade', key);
  const ptsClass = pts>0?'pos':(pts<0?'neg':'');
  const removeAttr = removeAction ? ` data-remove="${removeAction.replace(/"/g,'&quot;')}"` : '';
  const removeCls = removeAction ? ' removable' : '';
  return `<div class="card${removeCls}"${removeAttr}>
    <div class="card-info">
      <div class="card-label">${label}</div>
      <div class="card-pts ${ptsClass}">${fmt(pts)} pts${note?(' · '+note):''}</div>
    </div>
    <div class="card-actions">
      <button class="pill abir" onclick="__app.claim('${key}','abir',${pts},'${label.replace(/'/g,"\\'")}')">${state.names.abir}${cA?' ('+cA+')':''}</button>
      ${cA?`<button class="pill ghost" title="Undo ${state.names.abir}'s last claim" onclick="__app.undo('${key}','abir')">↺</button>`:''}
      <button class="pill jade" onclick="__app.claim('${key}','jade',${pts},'${label.replace(/'/g,"\\'")}')">${state.names.jade}${cJ?' ('+cJ+')':''}</button>
      ${cJ?`<button class="pill ghost" title="Undo ${state.names.jade}'s last claim" onclick="__app.undo('${key}','jade')">↺</button>`:''}
      ${removeAction?`<button class="card-remove-btn" data-remove="${removeAction.replace(/"/g,'&quot;')}" title="Remove (or right-click the card)">⋯</button>`:''}
    </div>
  </div>`;
}

function addForm(labelPh, ptsPh, onClick){
  return `<div class="bet-form" style="margin-top:10px;">
    <input id="${labelPh.id}" placeholder="${labelPh.text}">
    <input id="${ptsPh.id}" type="number" placeholder="${ptsPh.text}" style="max-width:110px;">
    <button class="btn-flame" onclick="${onClick}">Add</button>
  </div>`;
}

function renderDaily(){
  const base = DAILY.filter(item=>!state.hiddenDaily.includes(item.id)).map(item=>
    claimCard('daily:'+item.id, item.label, item.pts, null, `__app.hideDaily('${item.id}')`)
  ).join('');
  const custom = state.customDaily.map(item=>
    claimCard('daily:'+item.id, item.label, item.pts, null, `__app.removeDaily('${item.id}')`)
  ).join('');
  return base + custom + addForm(
    {id:'newDailyLabel', text:'New daily habit'},
    {id:'newDailyPts', text:'Points'},
    `__app.addDaily()`
  );
}

function renderAchievements(){
  return ACHIEVEMENTS.map(item=>claimCard('ach:'+item.id, item.label, item.pts)).join('');
}

function renderQuests(){
  const col = (party)=>{
    const base = QUESTS[party].map(item=>claimCard('quest:'+party+':'+item.id, item.label, item.pts)).join('');
    const custom = state.customQuests[party].map(item=>
      claimCard('quest:'+party+':'+item.id, item.label, item.pts, null, `__app.removeQuest('${party}','${item.id}')`)
    ).join('');
    const form = addForm(
      {id:'newQuestLabel_'+party, text:'New goal'},
      {id:'newQuestPts_'+party, text:'Points'},
      `__app.addQuest('${party}')`
    );
    return base + custom + form;
  };
  return `<div class="col2">
    <div>
      <div class="panel-title">${state.names.abir}'s Goals</div>
      ${col('abir')}
    </div>
    <div>
      <div class="panel-title">${state.names.jade}'s Goals</div>
      ${col('jade')}
    </div>
  </div>`;
}

function renderPenalties(){
  return PENALTIES.map(item=>claimCard('pen:'+item.id, item.label, item.pts)).join('');
}

function shopCard(item, party, removeAction){
  const balance = state.points[party];
  const cA = getCountToday(party, 'shop:'+item.id);
  const removeAttr = removeAction ? ` data-remove="${removeAction.replace(/"/g,'&quot;')}"` : '';
  const removeCls = removeAction ? ' removable' : '';
  const removeBtn = removeAction?`<button class="card-remove-btn" data-remove="${removeAction.replace(/"/g,'&quot;')}" title="Remove (or right-click the card)">⋯</button>`:'';
  if(item.pts == null){
    return `<div class="card${removeCls}"${removeAttr}>
      <div class="card-info">
        <div class="card-label">${item.label}</div>
        <div class="card-pts">${item.note}${cA?(' · claimed '+cA+'×'):''}</div>
      </div>
      <div class="card-actions">
        <button class="pill ${party}" onclick="__app.redeemShop('${party}','${item.id}')">Claim</button>
        ${cA?`<button class="pill ghost" onclick="__app.undo('shop:${item.id}','${party}')">↺</button>`:''}
        ${removeBtn}
      </div>
    </div>`;
  }
  if(item.flexible){
    return `<div class="card${removeCls}"${removeAttr}>
      <div class="card-info">
        <div class="card-label">${item.label}</div>
        <div class="card-pts">${item.note} · set your own point cost</div>
      </div>
      <div class="card-actions">
        <input class="num-input" type="number" id="flex-${party}-${item.id}" placeholder="${item.pts}">
        <button class="pill ${party}" onclick="__app.redeemFlexShop('${party}','${item.id}')">Redeem</button>
        ${cA?`<button class="pill ghost" onclick="__app.undo('shop:${item.id}','${party}')">↺</button>`:''}
        ${removeBtn}
      </div>
    </div>`;
  }
  const affordable = balance >= item.pts;
  return `<div class="card${removeCls}"${removeAttr}>
    <div class="card-info">
      <div class="card-label">${item.label}</div>
      <div class="card-pts ${affordable?'':'neg'}">${item.pts.toLocaleString()} pts${item.note?(' · '+item.note):''}${cA?(' · claimed '+cA+'×'):''}</div>
    </div>
    <div class="card-actions">
      <button class="pill ${party}" ${affordable?'':'disabled'} onclick="__app.redeemShop('${party}','${item.id}')">Redeem</button>
      ${cA?`<button class="pill ghost" onclick="__app.undo('shop:${item.id}','${party}')">↺</button>`:''}
      ${removeBtn}
    </div>
  </div>`;
}

function renderShop(){
  const col = (party)=>{
    const base = SHOP[party].map(i=>shopCard(i,party)).join('');
    const custom = state.customShop[party].map(i=>shopCard(i,party,`__app.removeShopItem('${party}','${i.id}')`)).join('');
    const form = `<div class="bet-form" style="margin-top:10px;">
      <input id="newShopLabel_${party}" placeholder="Wanted item">
      <input id="newShopPts_${party}" type="number" placeholder="Points" style="max-width:100px;">
      <input id="newShopNote_${party}" placeholder="Note (optional)" style="max-width:120px;">
      <button class="btn-flame" onclick="__app.addShopItem('${party}')">Add</button>
    </div>`;
    return base + custom + form;
  };
  return `<div class="col2">
    <div>
      <div class="panel-title">${state.names.abir}'s Shop</div>
      ${col('abir')}
    </div>
    <div>
      <div class="panel-title">${state.names.jade}'s Shop</div>
      ${col('jade')}
    </div>
  </div>`;
}

function renderBets(){
  const open = state.bets.filter(b=>b.status==='open');
  const resolved = state.bets.filter(b=>b.status!=='open');
  return `
    <div class="bet-form">
      <input id="betTitle" placeholder="What's the bet?">
      <input id="betStake" type="number" placeholder="Stake pts" style="max-width:110px;">
      <button class="btn-flame" onclick="__app.addBet()">Create Bet</button>
    </div>
    <div class="panel-title">Open Bets</div>
    ${open.length===0?'<div class="empty-note">No active bets. Make one above.</div>':''}
    ${open.map(b=>`<div class="card">
      <div class="card-info">
        <div class="card-label">${b.title}</div>
        <div class="card-pts pos">Stake: ${b.stake.toLocaleString()} pts</div>
      </div>
      <div class="card-actions">
        <button class="pill abir" onclick="__app.resolveBet('${b.id}','abir')">${state.names.abir} wins</button>
        <button class="pill jade" onclick="__app.resolveBet('${b.id}','jade')">${state.names.jade} wins</button>
        <button class="pill danger" onclick="__app.voidBet('${b.id}')">Void</button>
      </div>
    </div>`).join('')}
    <div class="panel-title">Resolved</div>
    ${resolved.length===0?'<div class="empty-note">Nothing settled yet.</div>':''}
    ${resolved.map(b=>`<div class="card">
      <div class="card-info">
        <div class="card-label">${b.title}</div>
        <div class="card-pts">${b.status==='void'?'Voided':('Won by '+state.names[b.winner]+' · '+b.stake.toLocaleString()+' pts')}</div>
      </div>
    </div>`).join('')}
  `;
}

function renderHistory(){
  if(state.history.length===0) return '<div class="empty-note">No actions logged yet — go claim something.</div>';
  return state.history.slice(0,150).map(h=>{
    const d = new Date(h.ts);
    const dateStr = d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    const cls = h.delta > 0 ? 'pos' : (h.delta < 0 ? 'neg' : '');
    return `<div class="hist-row">
      <div>
        <div>${h.reason}</div>
        <div class="hist-meta">${state.names[h.party]||h.party} · ${dateStr}</div>
      </div>
      <div class="hist-delta ${cls}">${fmt(h.delta)}</div>
    </div>`;
  }).join('');
}

function renderContent(){
  const el = document.getElementById('content');
  let inner = '';
  let title = '';
  switch(activeTab){
    case 'daily': title='Daily Habits'; inner = renderDaily(); break;
    case 'achievements': title='Achievements'; inner = renderAchievements(); break;
    case 'quests': title=''; inner = renderQuests(); break;
    case 'penalties': title='Penalties'; inner = renderPenalties(); break;
    case 'shop': title=''; inner = renderShop(); break;
    case 'bets': title='World Events: Bets & Challenges'; inner = renderBets(); break;
    case 'history': title='Point Log'; inner = renderHistory(); break;
  }
  const topActions = activeTab==='history'
    ? '<div class="top-actions"><button class="link-btn" onclick="__app.resetSeason()">Reset entire season</button></div>'
    : '';
  el.innerHTML = (title?`<div class="panel-title">${title}</div>`:'') + topActions + inner;
}

function renderTabs(){
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tab === activeTab);
  });
}

function renderAll(){
  renderBanners();
  renderDailyBoard();
  renderTabs();
  renderContent();
}

/* ---------------- removal via subtle button or right-click ---------------- */

function runRemove(call){
  if(!call) return;
  if(!confirm('Remove this item?')) return;
  (0, eval)(call);
}

document.addEventListener('click', e=>{
  const btn = e.target.closest('.card-remove-btn');
  if(!btn) return;
  e.stopPropagation();
  runRemove(btn.getAttribute('data-remove'));
});

document.addEventListener('contextmenu', e=>{
  const card = e.target.closest('.removable');
  if(!card) return;
  e.preventDefault();
  runRemove(card.getAttribute('data-remove'));
});

/* ---------------- daily leaderboard ---------------- */

function todayTotals(){
  const day = todayKey();
  const totals = {abir:0, jade:0};
  state.history.forEach(h=>{
    const d = new Date(h.ts);
    const key = d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    if(key === day && totals[h.party] !== undefined){
      totals[h.party] += h.delta;
    }
  });
  return totals;
}

function renderDailyBoard(){
  const el = document.getElementById('dailyBoard');
  if(!el) return;
  const t = todayTotals();
  let leadHtml = 'Tied today';
  if(t.abir !== t.jade){
    const abirLeads = t.abir > t.jade;
    const diff = Math.abs(t.abir - t.jade);
    const color = abirLeads ? '#722F37' : '#004700';
    leadHtml = `<b style="color:${color}">${abirLeads?state.names.abir:state.names.jade}</b> leading today by ${diff.toLocaleString()}`;
  }
  el.innerHTML = `
    <span class="daily-board-label">TODAY</span>
    <span>${state.names.abir}: ${fmt(t.abir)}</span>
    <span>${state.names.jade}: ${fmt(t.jade)}</span>
    <span>${leadHtml}</span>
  `;
}

document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab-btn');
  if(!btn) return;
  activeTab = btn.dataset.tab;
  renderTabs();
  renderContent();
});

const __app = {
  renameParty,
  claim(key, party, pts, label){ claim(key, party, pts, label); },
  undo(key, party){ undoLast(key, party); },
  redeemShop(party,id){ redeemShop(party, id); },
  redeemFlexShop(party,id){
    const input = document.getElementById('flex-'+party+'-'+id);
    const val = parseInt(input.value,10);
    if(!val || val<=0){ alert('Enter a point cost first.'); return; }
    redeemShop(party, id, val);
  },
  addDaily(){
    const label = document.getElementById('newDailyLabel').value.trim();
    const pts = parseInt(document.getElementById('newDailyPts').value,10);
    if(!label || !pts){ alert('Give it a name and a positive point value.'); return; }
    addCustomDaily(label, pts);
  },
  removeDaily(id){ removeCustomDaily(id); },
  hideDaily(id){ hideBaseDaily(id); },
  addQuest(party){
    const label = document.getElementById('newQuestLabel_'+party).value.trim();
    const pts = parseInt(document.getElementById('newQuestPts_'+party).value,10);
    if(!label || !pts){ alert('Give it a name and a positive point value.'); return; }
    addCustomQuest(party, label, pts);
  },
  removeQuest(party,id){ removeCustomQuest(party, id); },
  addShopItem(party){
    const label = document.getElementById('newShopLabel_'+party).value.trim();
    const pts = parseInt(document.getElementById('newShopPts_'+party).value,10);
    const note = document.getElementById('newShopNote_'+party).value.trim();
    if(!label || !pts){ alert('Give it a name and a positive point cost.'); return; }
    addCustomShop(party, label, pts, note);
  },
  removeShopItem(party,id){ removeCustomShop(party, id); },
  addBet(){
    const title = document.getElementById('betTitle').value.trim();
    const stake = parseInt(document.getElementById('betStake').value,10);
    if(!title || !stake || stake<=0){ alert('Give the bet a title and a stake in points.'); return; }
    state.bets.unshift({id:'bet_'+Date.now(), title, stake, status:'open', ts:Date.now()});
    saveState(); renderAll();
  },
  resolveBet(id, winner){
    const bet = state.bets.find(b=>b.id===id);
    if(!bet) return;
    bet.status = 'resolved';
    bet.winner = winner;
    claim('bet:'+id, winner, bet.stake, 'Bet won: '+bet.title);
  },
  voidBet(id){
    const bet = state.bets.find(b=>b.id===id);
    if(!bet) return;
    bet.status = 'void';
    saveState(); renderAll();
  },
  resetSeason
};
window.__app = __app;

/* ---------------- init ---------------- */
state = defaultState();
subscribeState();

} // end runApp
</script>
</body>
</html>
